<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Trial Link Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ট্রায়াল লিংক জেনারেটর</h2>
        <div class="form-group">
            <input type="text" id="targetUrl" placeholder="আসল ওয়েবসাইটের ইউআরএল (https://...) ">
            <input type="number" id="days" placeholder="কত দিনের ট্রায়াল?">
            <button onclick="generateLink()">লিংক তৈরি করুন</button>
        </div>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
