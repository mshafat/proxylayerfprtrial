<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Trial Link Generator v1.7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Trial Link Generator v1.7</h2>
        
        <div class="extend-section">
            <p style="margin: 0 0 8px 0; font-weight: bold; color: #007bff; font-size: 14px;">Extend Expired Link? (Optional)</p>
            <input type="text" id="expiredLinkInput" placeholder="Paste expired trial link here..." oninput="parseExpiredLink()">
        </div>

        <div class="form-group">
            <input type="text" id="targetUrl" placeholder="Original Web URL (https://...)">
            <input type="text" id="contactInfo" placeholder="Contact Info (Phone/Email)">
            <input type="text" id="purchaseUrl" placeholder="Purchase Link / Payment URL (Optional)">
            
            <label for="durationPreset" style="display:block; text-align:left; font-size:13px; font-weight:bold; color:#495057; margin-top:10px;">Trial Duration:</label>
            <select id="durationPreset" onchange="handleDurationChange()">
                <option value="0.5">12 Hours</option>
                <option value="1" selected>24 Hours</option>
                <option value="3">3 Days</option>
                <option value="7">7 Days</option>
                <option value="14">14 Days</option>
                <option value="30">30 Days</option>
                <option value="custom-days">Custom (Enter Days)</option>
                <option value="custom-date">Custom (Select Date & Time)</option>
            </select>

            <input type="number" id="customDaysInput" placeholder="Enter number of days" style="display: none;">
            <input type="datetime-local" id="customDateInput" onchange="handleDateInputChange()" style="display: none;">
            
            <div class="mode-selection">
                <p>Select Trial Mode:</p>
                <label id="fixedModeLabel">
                    <input type="radio" name="trialMode" id="fixedMode" value="fixed" checked> 
                    <strong>Fixed Calendar Trial</strong> (Expires on a set date for everyone)
                </label>
                <label id="evergreenModeLabel">
                    <input type="radio" name="trialMode" id="evergreenMode" value="evergreen"> 
                    <strong>On-Click Individual Trial</strong> (Evergreen - Starts when user clicks)
                </label>
            </div>
            
            <button onclick="generateLink()">Generate / Extend Trial Link</button>
        </div>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
